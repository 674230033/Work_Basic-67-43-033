        <main class="container">
            <div class="card order-box-form" id="contact">
                        <h2 class="contact-title">Register</h2>
                        <div class="contact-form-main-card">
                            <form action="" method="">

                                <div class="form-lom">
                                    <div class=".form-group">
                                        <label for="fname" class="form-label">Name</label>
                                        <input type="text" ld="fname" name="" placeholder="กรอกชื่อของคุณ"
                                            class="form-inpot">
                                    </div>
                                </div>

                                <div class="form-lom">
                                    <div class="form-group">
                                        <label for="email" class="form-label">E-mail</label>
                                        <input type="text" id="email" name="email" placeholder="กรอก Gmail"
                                            class="form-inpot">
                                    </div>
                                    <div class="form-group">
                                        <label for="phone" class="form-label"> phone</label>
                                        <input type="text" ld="phone" name="" placeholder="กรอกเบอร์โทรของคุณ"
                                            class="form-inpot">
                                    </div>
                                </div>
                                
                                <div class="from-group">
                                    <label for="detall" class="form-label">Message</label>
                                    <textarea name="detall" id="detall" placeholder="เขียนข้อความของคุณที่นี้"
                                        class="form-textarea"></textarea>
                                    <div class="from-group">

                                        <div style="margin-top: 30px;
                                                    margin-bottom: 30px;">
                                            <div class="checkbox-item">
                                                <input type="checkbox" id="interests1" name="interests[]"
                                                    value="ต้องการรับข่าวสารทาง email">
                                                <span>ฉันรับทราบและยอมรับ นโยบายความเป็นส่วนตัว</span>
                                            </div>
                                        </div>
                                        <div>
                                            <button type="submit" class="form-button"><a href="Conferm-Resgis.html">📨SUBMIT</a> </button>
                                        </div>
                            </form>
                        </div>


                    </div>
